# fail2ban filter for the caddy access log (apache-style common_log via the transform-encoder).
# bans on auth/abuse status codes only: 401/403 (credential stuffing, forbidden probes) and
# 429 (rate abuse). deliberately excludes 404 and other 4xx: a reverse-proxied SPA generates
# 404s constantly for missing source maps, favicons, and optional endpoints, so banning on any
# 4xx false-positives on legit clients (e.g. HA with devtools open fetching .js.map sources).
[Definition]
failregex = ^<HOST>.*"(GET|POST|HEAD|OPTIONS|PUT|DELETE|PATCH).*" (401|403|429) [0-9]+$
ignoreregex =
