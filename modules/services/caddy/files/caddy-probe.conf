# fail2ban filter for the caddy access log (apache-style common_log via the transform-encoder).
# bans on the REQUEST PATH, not the status code: these are paths that only a vulnerability scanner
# would ever request on our boxes, so a single hit is unambiguous (jail runs maxretry=1, instaban).
# we ban on the path regardless of the status code, because some probes get a 200/302 (caddy proxied
# them to a real backend) and a status-based filter would miss those. observed: a gravitysmtp CVE
# probe that got 200 off auth. keep this list tight: no bare /login, /admin, /api, /wp-json that a
# real service could serve. add a line when a new probe path shows up in any edge access.log.
#
# NOT a live CVE feed. this is the anti-crowdsec: a small hand-owned list, seeded from our own logs,
# extended by hand. it catches the scanner volume that actually hits us. it will not catch a zero-day
# the day it drops. re-scan the log periodically and add what's new (see modules/services/caddy/README).
#
# the \.php catch-all: nothing behind this caddy serves php (jellyfin, grafana, authentik, home
# assistant, the arr UIs are all non-php), so ANY .php request is a probe. this collapses the endless
# spray of random shell filenames (/x.php /d62.php /aaa.php /4PJcpMFsD8B.php ...) into one rule. if a
# php app is ever added behind here, remove \.php and re-enumerate the specific wordpress paths.
[Definition]
# match the probe token in the request PATH only, not the query string. the [^"?]* before and
# [^"?\s]* after the token stop at the first ? or space, so a legit "GET /login?redirectTo=...evil.php"
# (our auth service reflecting an attacker's target back into a redirect param, returned 200) does
# NOT match on the .php buried in its query string. we ban the IP that requested the probe directly,
# not the redirect it caused.
failregex = ^<HOST> .*"(GET|POST|HEAD|PUT) [^"?]*(%(probe_paths)s)[^"?\s]*[ ?][^"]*" [0-9]+ [0-9]+$

# short bare-word tokens (/env /config /server) use a (?=[ ?"]) lookahead so they match the exact
# path segment only, not a longer legit path like /environment or /configuration.
probe_paths = \.php|/wp-admin|/wp-content/|/wp-includes/|/wordpress/|/wp-json/gravitysmtp/|/\.env|/\.git/|/\.svn/|/\.hg/|/\.aws/credentials|/\.aws/config|/\.ssh/|/phpmyadmin|/phpMyAdmin|/pma/|/mysqladmin|/dbadmin/|/vendor/phpunit|/eval-stdin|/config\.php\.bak|/config\.env|/webshell|/cgi-bin/|/actuator/|/solr/|/console/|/manager/html|/HNAP1|/boaform/|/GponForm/|/setup\.cgi|/\.DS_Store|/backup\.sql|/dump\.sql|/database\.sql|/this_is_a_new_hello_world|/docker-compose|/terraform\.tf(vars|state)|/serverless\.ya?ml|/secrets\.ya?ml|/\.streamlit/secrets|/settings\.py|/\.flaskenv|/\.vultr-cli|/\.linode-cli|/\.config/hcloud|/\.config/linode|/server-status|/login\.action|/@vite/env|/trace\.axd|/debug/default/view|/___proxy_subdomain_cpanel|/env(?=[ ?"])|/config(?=[ ?"])|/server(?=[ ?"])

ignoreregex =
