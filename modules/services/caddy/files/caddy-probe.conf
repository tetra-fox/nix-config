# fail2ban filter for the caddy access log (apache-style common_log via the transform-encoder).
# bans on the REQUEST PATH, not the status code: these are paths that only a vulnerability scanner
# would ever request on our boxes, so a single hit is unambiguous (jail runs maxretry=1, instaban).
# the software these probe for does not run here, so the request returns 404, but we ban on the
# path regardless of status. keep this list evergreen (paths hammered for years) and tight: no bare
# /admin, /api, /login, /wp-json etc that a legitimate service could serve. add a line when a new
# probe path shows up in the logs. every literal dot is escaped so one entry can't break the group.
#
# NOT a live CVE feed. this is the anti-crowdsec: a small hand-owned list of the junk that actually
# hits us, extended by hand. it catches the decade-old wordpress/.env/.git/phpunit probes that make
# up the real scanner volume, and stays out of the way. it will not catch a zero-day the day it drops.
[Definition]
failregex = ^<HOST> .*"(GET|POST|HEAD|PUT) [^"]*(%(probe_paths)s)[^"]*" [0-9]+ [0-9]+$

probe_paths = /wp-login\.php|/wp-admin|/xmlrpc\.php|/wp-content/plugins/|/wp-includes/|/wordpress/|/\.env|/\.env\.|/\.git/|/\.svn/|/\.hg/|/\.aws/credentials|/\.ssh/|/phpmyadmin|/phpMyAdmin|/pma/|/mysqladmin|/adminer\.php|/dbadmin/|/vendor/phpunit|/eval-stdin\.php|/phpunit/src/Util/PHP/eval-stdin\.php|/\.php~|/config\.php\.bak|/wp-config\.php\.bak|/shell\.php|/cmd\.php|/c99\.php|/r57\.php|/webshell|/\.well-known/security\.txt/|/cgi-bin/|/actuator/|/solr/|/console/|/manager/html|/HNAP1|/boaform/|/GponForm/|/setup\.cgi|/\.DS_Store|/backup\.sql|/dump\.sql|/database\.sql|/wp-content/uploads/.*\.php

ignoreregex =
