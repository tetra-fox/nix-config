# fail2ban filter for the caddy access log (apache-style common_log via the transform-encoder).
# matches any 4xx response and bans the source after maxretry hits in findtime (set in the jail).
[Definition]
failregex = ^<HOST>.*"(GET|POST|HEAD|OPTIONS|PUT|DELETE|PATCH).*" 4[0-9][0-9] [0-9]+$
ignoreregex =
