# sops-nix recipients. encrypted files live under ./secrets/.
# generate the user age key once with `age-keygen -o ~/.config/sops/age/keys.txt`
# and replace the placeholder below with the resulting public key.
#
# host age keys are derived from the vm's ssh ed25519 host key:
#   ssh <host> 'cat /etc/ssh/ssh_host_ed25519_key.pub' | ssh-to-age
#
# after editing this file, re-encrypt every yaml under secrets/ with:
#   sops updatekeys secrets/<path>.yaml

keys:
  # users
  - &user_tetra age1en4ycn72qkfzqge4exkxe6jjzuxtp5090zr6z3wqhgf0qsha8e4s8dhgs8

  # hosts
  - &host_mesa_svc_01 age1jwvvwvzlvqrxhyy5y84ltn7w6gtq52ss5ek93whlvx3hxezkjejqaxylpj
  - &host_fairlane_svc_01 age14760cr4x8zzd5tuf3w8ff2auyhjxju20mp88w5ackqlsrlal4s9s6m4qyz

creation_rules:
  # per-host file, encrypted to that host's key only (plus the user). a host must
  # not be able to decrypt another host's secrets, so don't collapse these into one
  # broad rule. the regex must match before the catch-all below.
  - path_regex: secrets/mesa-svc-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_svc_01
  - path_regex: secrets/fairlane-svc-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_fairlane_svc_01
  # mesa-mon-01: bootstrap = user key only until the VM is installed and its host
  # age key exists. after install, add `&host_mesa_mon_01` above and to this rule,
  # then `sops updatekeys secrets/mesa-mon-01.yaml`.
  - path_regex: secrets/mesa-mon-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
