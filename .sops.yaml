# sops-nix recipients. encrypted files live under ./secrets/.
# generate the user age key once with `age-keygen -o ~/.config/sops/age/keys.txt`
# and replace the placeholder below with the resulting public key.
#
# host age keys are derived from the vm's ssh ed25519 host key:
#   ssh <host> 'cat /etc/ssh/ssh_host_ed25519_key.pub' | ssh-to-age
#
# after editing this file, re-encrypt every yaml under secrets/ with:
#   sops updatekeys secrets/<path>.yaml

keys:
  # users
  - &user_tetra age1en4ycn72qkfzqge4exkxe6jjzuxtp5090zr6z3wqhgf0qsha8e4s8dhgs8

  # hosts
  - &host_mesa_svc_01 age1jwvvwvzlvqrxhyy5y84ltn7w6gtq52ss5ek93whlvx3hxezkjejqaxylpj
  - &host_fairlane_svc_01 age14760cr4x8zzd5tuf3w8ff2auyhjxju20mp88w5ackqlsrlal4s9s6m4qyz
  - &host_mesa_mon_01 age17h8yezx0j8sqmpwuxc836pzd386u59x6wfh8m02f48v8ycyrhvxq8v9avd
  - &host_mesa_db_01 age187esnmkpydleuaygxvzze0yaqzypamxrm8a8sx9t0p2vz5dz0uaszcp86m
  - &host_mesa_db_02 age1ls3v700tkjegmklg95pe4xe9tp3nnm80970ltddezqn3vs58430qynytt3
  - &host_mesa_db_03 age152g02shenugt7qesepn3d0l4u0nzt5uy5ud5mghngvjl0r3zjp3qjxtyzn
  - &host_mesa_auth_01 age17qpwggy9h6vfwh7dvyltxum5hdce8lmgp9sxnr205pelmh9qpurqdq6wex
  - &host_mesa_edge_01 age1ww87qy6watdrne3r94vzaal9xamu9sdxkfp9awswymkha6y5ruus8396eq
  - &host_mesa_edge_02 age18ga99v2fzg9826m6kh9q8cekdzjh2pq48js2xm5k8afgkulnvvssu5ajxe

creation_rules:
  # per-host file, encrypted to that host's key only (plus the user). a host must
  # not be able to decrypt another host's secrets, so don't collapse these into one
  # broad rule. the regex must match before the catch-all below.
  - path_regex: secrets/mesa-svc-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_svc_01
  - path_regex: secrets/fairlane-svc-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_fairlane_svc_01
  - path_regex: secrets/mesa-mon-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_mon_01
  - path_regex: secrets/mesa-db-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_db_01
  - path_regex: secrets/mesa-db-02\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_db_02
  - path_regex: secrets/mesa-db-03\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_db_03
  - path_regex: secrets/mesa-auth-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_auth_01
  - path_regex: secrets/mesa-edge-01\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_edge_01
  - path_regex: secrets/mesa-edge-02\.yaml$
    key_groups:
      - age:
          - *user_tetra
          - *host_mesa_edge_02
