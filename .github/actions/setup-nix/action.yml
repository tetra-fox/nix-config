name: Set up Nix
description: Install Nix with the deploy key for the private nix-secrets input and a github access token.

inputs:
  ssh-private-key:
    description: Deploy key for the tetra-fox/nix-secrets flake input.
    required: true
  github-token:
    description: Token used for github.com access-tokens, to avoid api rate limits when fetching inputs.
    required: true

runs:
  using: composite
  steps:
    - name: Set up SSH agent for tetra-fox/nix-secrets
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-unstable.tar.gz
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ inputs.github-token }}

    # restore the nix store from a previous run so tool closures (statix, alejandra,
    # colmena, ...) are a local restore instead of a re-fetch. must run after the nix
    # install: the action fixes permissions on /nix/var/nix/db, which only exists once
    # nix is installed. keyed on flake.lock so a hit means inputs are unchanged; a lock
    # bump falls back to the newest prior store as a base via the prefix. gc-max caps
    # the saved store so it stays under github's per-repo cache limit.
    - name: Cache the nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 4G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-last-accessed: 0
        purge-primary-key: never
