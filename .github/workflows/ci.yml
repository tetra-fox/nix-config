name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # cache-nix-action purges stale nix-store caches

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix fmt -- --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop -c statix check .

  # ensure fleet discovery remains generic
  fleet-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          out=$(nix eval --impure --raw --expr 'import ./lib/fleet-test.nix { lib = (builtins.getFlake (toString ./.)).inputs.nixpkgs.lib; }')
          [ "$out" = ok ] || { echo "fleet-test: $out"; exit 1; }

  discover:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.list.outputs.hosts }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: list
        run: echo "hosts=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames)" >> "$GITHUB_OUTPUT"

  eval:
    name: eval ${{ matrix.host }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.discover.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix eval --raw .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath
