name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # cache-nix-action purges stale nix-store caches

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # tool set matches the devshell in flake.nix; --inputs-from resolves `nixpkgs`
      # to the root flake.lock's pinned rev without evaluating the flake, so this job
      # fetches one input instead of all of them (and never realises the ~8G devshell
      # closure)
      - run: nix shell --inputs-from . nixpkgs#alejandra nixpkgs#statix nixpkgs#just -c just fmt-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix shell --inputs-from . nixpkgs#alejandra nixpkgs#statix nixpkgs#just -c just lint

  # ensure fleet discovery remains generic
  fleet-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          out=$(nix eval --impure --raw --expr 'import ./lib/fleet-test.nix { lib = (builtins.getFlake (toString ./.)).inputs.nixpkgs.lib; }')
          [ "$out" = ok ] || { echo "fleet-test: $out"; exit 1; }

  discover:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.list.outputs.hosts }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # both host classes, as full toplevel attr paths: darwin evals fine on
      # linux (eval is cross-platform) and auto-discovery means a new mac gets
      # CI coverage the same way a new server does
      - id: list
        run: |
          nixos=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames)
          darwin=$(nix eval --json .#darwinConfigurations --apply builtins.attrNames)
          echo "hosts=$(jq -cn --argjson n "$nixos" --argjson d "$darwin" \
            '[($n[] | "nixosConfigurations." + . + ".config.system.build.toplevel"),
              ($d[] | "darwinConfigurations." + . + ".system")]')" >> "$GITHUB_OUTPUT"

  eval:
    name: eval ${{ matrix.host }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(needs.discover.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix eval --raw '.#${{ matrix.host }}.drvPath'
