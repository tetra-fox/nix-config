name: Update flake inputs

on:
  schedule:
    - cron: "0 13 * * 2" # Tuesday at 13:00 UTC
  workflow_dispatch:

jobs:
  update-flake-inputs:
    name: Update flake inputs
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write # cache-nix-action purges stale nix-store caches

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Nix
        uses: ./.github/actions/setup-nix
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake inputs
        run: nix flake update

      # https://github.com/actions/checkout#push-a-commit-using-the-built-in-token
      - name: Commit changes
        run: |
          if git diff --quiet HEAD -- flake.lock; then
            echo "flake.lock unchanged, skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore(flake): bump flake inputs"
          git push
